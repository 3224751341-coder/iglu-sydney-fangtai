name: Update Iglu Fangtai

on:
  schedule:
    - cron: '*/5 * * * *'    # 临时：每5分钟一次，测试用
  push:
    branches: [main]
    paths:
      - 'update_fangtai.py'
      - 'template.html'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape and Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ef0a1a33b94f19c47fb3f9e2737f9214
        run: python update_fangtai.py
