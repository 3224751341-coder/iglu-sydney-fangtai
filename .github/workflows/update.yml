name: Update Iglu Fangtai

on:
  schedule:
    - cron: '3 0 * * *'   # 10:03 Sydney (UTC+10)
    - cron: '7 9 * * *'    # 19:07 Sydney (UTC+10)
  workflow_dispatch:       # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape and Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ef0a1a33b94f19c47fb3f9e2737f9214
        run: python update_fangtai.py
